<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="ハタチュウのSNS・配信プラットフォームリンク集">

          </div>
          <div id="bio" class="bio"></div>
          <div id="profile-links" class="profile-links" aria-label="関連リンク"></div>
        </div>
        <div class="stand-wrap" aria-hidden="true">
          <img class="stand" src="./assets/stand.webp" alt="" width="420" height="630">
        </div>
      </section>

      <section id="links" class="links" aria-label="リンク一覧"></section>
    </main>

    <script src="./content.js"></script>
    <script src="./script.js"></script>
